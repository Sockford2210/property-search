services:
  db:
    image: postgis/postgis:17-3.5
    container_name: propertysearch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: propertysearch
      POSTGRES_USER: propertysearch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/01-postgis.sql:/docker-entrypoint-initdb.d/01-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propertysearch -d propertysearch"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
